services:
  postgres:
    image: postgres:15
    container_name: demo_hasura_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  hasura:
    image: hasura/graphql-engine:v2.42.0
    container_name: demo_hasura_engine
    depends_on:
      - postgres
    restart: unless-stopped
    ports:
      - "8089:8080"
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://hasura:hasura@postgres:5432/demo
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: supersecret

  demo_hasura:
    build:
      context: ./backend
    container_name: demo_hasura_app
    depends_on:
      - postgres
      - hasura
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      HASURA_URL: http://hasura:8080/v1/graphql
      DATABASE_URL: postgres://hasura:hasura@postgres:5432/demo

volumes:
  postgres_data: